<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Tusoskop — Yönlendiriliyor</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #05070d;
        color: #e2e8f0;
      }
      main {
        width: min(100%, 26rem);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.025);
        backdrop-filter: blur(16px);
        border-radius: 1.75rem;
        padding: 2rem 1.5rem;
      }
      .mark {
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1rem;
        border-radius: 999px;
        border: 2px solid rgba(16, 185, 129, 0.35);
        border-top-color: #34d399;
        animation: spin 0.9s linear infinite;
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.125rem; font-weight: 800; }
      p { margin: 0; color: #94a3b8; font-size: 0.9375rem; line-height: 1.5; }
      .links { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
      a { color: #6ee7b7; font-weight: 700; text-decoration: none; }
      a:hover { text-decoration: underline; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>Tusoskop'a yönlendiriliyorsun</h1>
      <p id="status">Cihazın algılanıyor…</p>
      <div class="links">
        <a id="ios-link" href="https://apps.apple.com/tr/app/tusoskop/id6776331691?l=tr">App Store'da Aç</a>
        <a id="web-link" href="https://tusoskop.com/">Web Sitesine Git</a>
      </div>
    </main>
    <script>
      (function () {
        var APP_STORE_FALLBACK = "https://apps.apple.com/tr/app/tusoskop/id6776331691?l=tr";
        var SITE_HOME = "https://tusoskop.com/";
        var CAMPAIGN_PATTERN = /^[a-z0-9_-]{1,40}$/;
        var MEDIUM_PATTERN = /^[a-z0-9_-]{1,20}$/;

        function normalizeCampaign(raw, paramPresent) {
          if (!paramPresent) return "organic";
          var value = String(raw || "").trim().toLowerCase();
          if (!value) return "unknown";
          return CAMPAIGN_PATTERN.test(value) ? value : "unknown";
        }

        function normalizeMedium(raw, paramPresent) {
          if (!paramPresent) return "story";
          var value = String(raw || "").trim().toLowerCase();
          if (!value) return "story";
          return MEDIUM_PATTERN.test(value) ? value : "story";
        }

        function detectPlatform() {
          var ua = navigator.userAgent || "";
          var platform = navigator.platform || "";
          var maxTouch = navigator.maxTouchPoints || 0;
          if (/iPhone|iPod/i.test(ua)) return "ios";
          if (/iPad/i.test(ua)) return "ios";
          if (platform === "MacIntel" && maxTouch > 1) return "ios";
          if (/Android/i.test(ua)) return "android";
          if (/Windows NT|Macintosh|Linux|CrOS/i.test(ua)) return "desktop";
          return "unknown";
        }

        function buildWebUrl(campaign, medium) {
          var params = new URLSearchParams({
            utm_source: "instagram",
            utm_medium: medium,
            utm_campaign: campaign,
          });
          return SITE_HOME + "?" + params.toString();
        }

        function buildAppStoreUrl() {
          return APP_STORE_FALLBACK;
        }

        function buildDeepLink(httpsUrl) {
          return httpsUrl.replace(/^https:\/\//, "itms-apps://");
        }

        var params = new URLSearchParams(window.location.search);
        var campaignPresent = params.has("c");
        var mediumPresent = params.has("m");
        var campaign = normalizeCampaign(params.get("c"), campaignPresent);
        var medium = normalizeMedium(params.get("m"), mediumPresent);
        var platform = detectPlatform();
        var appStoreUrl = buildAppStoreUrl(campaign);
        var webUrl = buildWebUrl(campaign, medium);
        var redirectUrl = platform === "ios" ? appStoreUrl : webUrl;
        var status = document.getElementById("status");
        var iosLink = document.getElementById("ios-link");
        var webLink = document.getElementById("web-link");

        iosLink.href = appStoreUrl;
        webLink.href = webUrl;

        function applyRedirect(targets) {
          iosLink.href = targets.appStoreUrl;
          webLink.href = targets.webUrl;
          if (targets.platform === "ios") {
            status.textContent = "iPhone veya iPad algılandı. App Store açılıyor…";
            window.location.replace(targets.appStoreDeepLink || buildDeepLink(targets.appStoreUrl));
            window.setTimeout(function () {
              window.location.replace(targets.redirectUrl);
            }, 900);
            return;
          }
          status.textContent = platform === "android"
            ? "Android cihaz algılandı. Web sürümüne yönlendiriliyorsun…"
            : "Web sürümüne yönlendiriliyorsun…";
          window.location.replace(targets.redirectUrl);
        }

        var apiQuery = window.location.search
          ? window.location.search + "&format=json"
          : "?format=json";

        fetch("/api/campaign-redirect" + apiQuery, {
          method: "GET",
          credentials: "same-origin",
          keepalive: true,
        })
          .then(function (response) {
            if (!response.ok) throw new Error("api_unavailable");
            return response.json();
          })
          .then(function (payload) {
            applyRedirect(payload);
          })
          .catch(function () {
            applyRedirect({
              platform: platform,
              appStoreUrl: appStoreUrl,
              appStoreDeepLink: buildDeepLink(appStoreUrl),
              webUrl: webUrl,
              redirectUrl: redirectUrl,
            });
          });
      })();
    </script>
  </body>
</html>
