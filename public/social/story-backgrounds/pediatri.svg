<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
<defs>
  <radialGradient id="bg" cx="50%" cy="36%" r="65%">
    <stop offset="0%" stop-color="#2a0818"/>
    <stop offset="100%" stop-color="#010209"/>
  </radialGradient>
  <!-- Brain gradient — warm pink/rose for pediatrics -->
  <radialGradient id="brainOut" cx="360" cy="480" r="520" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#f472b6"/>
    <stop offset="28%" stop-color="#be185d"/>
    <stop offset="62%" stop-color="#6d1040"/>
    <stop offset="100%" stop-color="#200510"/>
  </radialGradient>
  <radialGradient id="brainIn" cx="430" cy="560" r="380" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#ec4899"/>
    <stop offset="45%" stop-color="#9d174d"/>
    <stop offset="100%" stop-color="#2d0815"/>
  </radialGradient>
  <radialGradient id="ventricle" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#fce7f3"/>
    <stop offset="50%" stop-color="#f9a8d4"/>
    <stop offset="100%" stop-color="#be185d"/>
  </radialGradient>
  <radialGradient id="pSpec" cx="34%" cy="26%" r="44%">
    <stop offset="0%" stop-color="rgba(249,168,212,0.32)"/>
    <stop offset="55%" stop-color="rgba(244,114,182,0.07)"/>
    <stop offset="100%" stop-color="rgba(190,24,93,0)"/>
  </radialGradient>
  <radialGradient id="pVig" cx="50%" cy="46%" r="58%">
    <stop offset="52%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.90"/>
  </radialGradient>
  <linearGradient id="pTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010209" stop-opacity="0.65"/>
    <stop offset="14%" stop-color="#010209" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="pBot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="68%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.82"/>
  </linearGradient>
</defs>
<rect width="1080" height="1920" fill="#010209"/>
<rect width="1080" height="1920" fill="url(#bg)"/>
<ellipse cx="540" cy="720" rx="400" ry="360" fill="#2a0818" opacity="0.55"/>

<!-- BRAIN (neonatal, smooth gyri) centered at (540, 720) -->
<g transform="translate(540, 720)">
  <!-- Main brain outline — cerebral hemispheres -->
  <!-- Left hemisphere -->
  <path d="M 0,-320 C -50,-335 -130,-325 -200,-295 C -285,-258 -355,-195 -385,-118 C -418,-32 -405,55 -370,120 C -335,185 -282,232 -218,255 C -155,278 -90,275 -35,252 C -10,240 0,225 0,210 L 0,-320 Z"
    fill="url(#brainOut)"/>
  <!-- Right hemisphere -->
  <path d="M 0,-320 C 50,-335 130,-325 200,-295 C 285,-258 355,-195 385,-118 C 418,-32 405,55 370,120 C 335,185 282,232 218,255 C 155,278 90,275 35,252 C 10,240 0,225 0,210 L 0,-320 Z"
    fill="url(#brainOut)"/>

  <!-- Inner cerebral cortex texture -->
  <path d="M 0,-285 C -45,-298 -118,-290 -182,-264 C -260,-232 -322,-175 -348,-102 C -375,-26 -362,52 -330,108 C -298,162 -248,204 -190,224 C -132,244 -76,240 -30,220 C -10,210 0,198 0,188 L 0,-285 Z"
    fill="url(#brainIn)" opacity="0.65"/>
  <path d="M 0,-285 C 45,-298 118,-290 182,-264 C 260,-232 322,-175 348,-102 C 375,-26 362,52 330,108 C 298,162 248,204 190,224 C 132,244 76,240 30,220 C 10,210 0,198 0,188 L 0,-285 Z"
    fill="url(#brainIn)" opacity="0.65"/>

  <!-- Gyri (folds) - primary sulci and gyri -->
  <!-- Left hemisphere sulci -->
  <g fill="none" stroke="#f9a8d4" stroke-linecap="round" opacity="0.45">
    <!-- Central sulcus area -->
    <path d="M -50,-310 Q -110,-280 -145,-220 Q -175,-160 -165,-100" stroke-width="8"/>
    <path d="M -160,-270 Q -228,-240 -270,-178 Q -310,-115 -308,-48" stroke-width="7"/>
    <!-- Lateral sulcus -->
    <path d="M -60,-150 Q -120,-140 -180,-120 Q -245,-98 -285,-60" stroke-width="7"/>
    <!-- Parieto-occipital area -->
    <path d="M -95,-180 Q -138,-140 -155,-85 Q -168,-25 -150,30" stroke-width="6"/>
    <path d="M -240,-135 Q -300,-108 -335,-55 Q -362,0 -350,58" stroke-width="6"/>
    <!-- Frontal lobe -->
    <path d="M -80,-285 Q -105,-230 -98,-168 Q -90,-110 -60,-72" stroke-width="6"/>
  </g>
  <!-- Right hemisphere sulci -->
  <g fill="none" stroke="#f9a8d4" stroke-linecap="round" opacity="0.40">
    <path d="M 50,-310 Q 110,-280 145,-220 Q 175,-160 165,-100" stroke-width="8"/>
    <path d="M 160,-270 Q 228,-240 270,-178 Q 310,-115 308,-48" stroke-width="7"/>
    <path d="M 60,-150 Q 120,-140 180,-120 Q 245,-98 285,-60" stroke-width="7"/>
    <path d="M 95,-180 Q 138,-140 155,-85 Q 168,-25 150,30" stroke-width="6"/>
    <path d="M 240,-135 Q 300,-108 335,-55 Q 362,0 350,58" stroke-width="6"/>
    <path d="M 80,-285 Q 105,-230 98,-168 Q 90,-110 60,-72" stroke-width="6"/>
  </g>

  <!-- Interhemispheric fissure -->
  <line x1="0" y1="-320" x2="0" y2="210" stroke="#010209" stroke-width="18" opacity="0.70"/>
  <line x1="0" y1="-320" x2="0" y2="210" stroke="#f9a8d4" stroke-width="4" opacity="0.30"/>

  <!-- Lateral ventricles (fluid-filled, C-shaped) -->
  <!-- Left lateral ventricle -->
  <path d="M -30,-150 Q -55,-170 -80,-155 Q -110,-138 -118,-105 Q -125,-72 -108,-52 Q -88,-32 -60,-35 Q -35,-38 -28,-62 Q -22,-85 -30,-150 Z"
    fill="url(#ventricle)" opacity="0.72"/>
  <!-- Right lateral ventricle -->
  <path d="M 30,-150 Q 55,-170 80,-155 Q 110,-138 118,-105 Q 125,-72 108,-52 Q 88,-32 60,-35 Q 35,-38 28,-62 Q 22,-85 30,-150 Z"
    fill="url(#ventricle)" opacity="0.70"/>
  <!-- Third ventricle (thin, midline) -->
  <rect x="-10" y="-95" width="20" height="68" rx="9" fill="url(#ventricle)" opacity="0.65"/>

  <!-- Corpus callosum (commissure connecting hemispheres) -->
  <path d="M -140,-55 Q -80,-82 0,-85 Q 80,-82 140,-55" fill="none" stroke="#fce7f3" stroke-width="20" stroke-linecap="round" opacity="0.48"/>
  <path d="M -130,-55 Q -75,-78 0,-80 Q 75,-78 130,-55" fill="none" stroke="#fce7f3" stroke-width="8" stroke-linecap="round" opacity="0.25"/>

  <!-- Cerebellum (lower portion) -->
  <path d="M -218,255 C -240,275 -250,310 -230,345 C -210,378 -150,395 0,398 C 150,395 210,378 230,345 C 250,310 240,275 218,255 C 155,278 90,275 35,252 C 10,240 0,225 0,210 C 0,225 -10,240 -35,252 C -90,275 -155,278 -218,255 Z"
    fill="#c0266a" opacity="0.72"/>
  <!-- Cerebellar folia -->
  <g fill="none" stroke="#fda4c8" stroke-linecap="round" opacity="0.38">
    <path d="M -180,280 Q 0,268 180,280" stroke-width="5"/>
    <path d="M -210,310 Q 0,295 210,310" stroke-width="5"/>
    <path d="M -225,340 Q 0,325 225,340" stroke-width="4"/>
    <path d="M -210,368 Q 0,354 210,368" stroke-width="4"/>
  </g>

  <!-- Brain stem -->
  <rect x="-35" y="395" width="70" height="120" rx="35" fill="#be185d" opacity="0.68"/>
  <rect x="-25" y="398" width="50" height="110" rx="25" fill="#f472b6" opacity="0.35"/>

  <!-- Specular highlight -->
  <ellipse cx="-90" cy="-240" rx="100" ry="62" fill="rgba(249,168,212,0.22)" transform="rotate(20 -90 -240)"/>
  <ellipse cx="-45" cy="-295" rx="55" ry="32" fill="rgba(252,231,243,0.15)" transform="rotate(10 -45 -295)"/>

  <!-- Combined specular -->
  <path d="M 0,-320 C -50,-335 -130,-325 -200,-295 C -285,-258 -355,-195 -385,-118 C -418,-32 -405,55 -370,120 C -335,185 -282,232 -218,255 L 218,255 C 282,232 335,185 370,120 C 405,55 418,-32 385,-118 C 355,-195 285,-258 200,-295 C 130,-325 50,-335 0,-320 Z"
    fill="url(#pSpec)" opacity="0.78"/>
  <path d="M 0,-320 C -50,-335 -130,-325 -200,-295 C -285,-258 -355,-195 -385,-118 C -418,-32 -405,55 -370,120 C -335,185 -282,232 -218,255 L 218,255 C 282,232 335,185 370,120 C 405,55 418,-32 385,-118 C 355,-195 285,-258 200,-295 C 130,-325 50,-335 0,-320 Z"
    fill="none" stroke="#010209" stroke-width="32" opacity="0.50"/>
</g>

<rect width="1080" height="1920" fill="url(#pVig)"/>
<rect width="1080" height="1920" fill="url(#pTop)"/>
<rect width="1080" height="1920" fill="url(#pBot)"/>
</svg>
