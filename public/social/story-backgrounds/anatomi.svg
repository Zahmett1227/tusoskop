<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
<defs>
  <radialGradient id="bg" cx="50%" cy="35%" r="68%">
    <stop offset="0%" stop-color="#0a1520"/>
    <stop offset="100%" stop-color="#010209"/>
  </radialGradient>
  <!-- Skull/bone gradient - ivory lit from upper-left -->
  <radialGradient id="bone" cx="370" cy="300" r="480" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#d4c8a8"/>
    <stop offset="30%" stop-color="#9e8e6a"/>
    <stop offset="65%" stop-color="#5a4e34"/>
    <stop offset="100%" stop-color="#1a1408"/>
  </radialGradient>
  <radialGradient id="boneInner" cx="440" cy="380" r="340" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#c0b090"/>
    <stop offset="50%" stop-color="#7a6844"/>
    <stop offset="100%" stop-color="#2a2010"/>
  </radialGradient>
  <radialGradient id="cranium" cx="50%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#e8dcc0"/>
    <stop offset="45%" stop-color="#a89060"/>
    <stop offset="100%" stop-color="#382c14"/>
  </radialGradient>
  <radialGradient id="bSpec" cx="33%" cy="22%" r="42%">
    <stop offset="0%" stop-color="rgba(255,245,225,0.35)"/>
    <stop offset="55%" stop-color="rgba(255,235,200,0.08)"/>
    <stop offset="100%" stop-color="rgba(255,220,180,0)"/>
  </radialGradient>
  <radialGradient id="bVig" cx="50%" cy="44%" r="58%">
    <stop offset="52%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.90"/>
  </radialGradient>
  <linearGradient id="bTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010209" stop-opacity="0.65"/>
    <stop offset="14%" stop-color="#010209" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="bBot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="68%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.82"/>
  </linearGradient>
</defs>
<rect width="1080" height="1920" fill="#010209"/>
<rect width="1080" height="1920" fill="url(#bg)"/>
<ellipse cx="540" cy="680" rx="380" ry="340" fill="#1a1408" opacity="0.60"/>

<!-- HUMAN SKULL centered at (540, 680) -->
<g transform="translate(540,680)">
  <!-- Cranium (brain case) — large dome -->
  <path d="M 0,-380 C 160,-385 295,-310 340,-175 C 380,-52 365,80 295,165 C 225,248 130,262 80,252 L 70,300 L -70,300 L -80,252 C -130,262 -225,248 -295,165 C -365,80 -380,-52 -340,-175 C -295,-310 -160,-385 0,-380 Z" fill="url(#bone)"/>

  <!-- Cranium inner surface (diploë) -->
  <path d="M 0,-335 C 138,-340 258,-270 295,-148 C 328,-38 316,72 258,145 C 195,218 112,230 68,220 L 58,268 L -58,268 L -68,220 C -112,230 -195,218 -258,145 C -316,72 -328,-38 -295,-148 C -258,-270 -138,-340 0,-335 Z" fill="url(#boneInner)" opacity="0.68"/>

  <!-- Brain cavity (dark inside) -->
  <path d="M 0,-295 C 118,-298 222,-234 252,-122 C 278,-24 270,70 218,132 C 168,188 96,198 58,190 L 48,238 L -48,238 L -58,190 C -96,198 -168,188 -218,132 C -270,70 -278,-24 -252,-122 C -222,-234 -118,-298 0,-295 Z" fill="#0a0808" opacity="0.82"/>

  <!-- Facial bones - zygomatic arch -->
  <path d="M -295,165 Q -345,180 -380,165 Q -410,150 -405,120 Q -400,90 -370,88 Q -340,86 -315,100 L -295,165 Z" fill="url(#boneInner)" opacity="0.72"/>
  <path d="M 295,165 Q 345,180 380,165 Q 410,150 405,120 Q 400,90 370,88 Q 340,86 315,100 L 295,165 Z" fill="url(#boneInner)" opacity="0.72"/>

  <!-- Mandible (lower jaw) -->
  <path d="M -65,300 Q -160,305 -220,285 Q -280,265 -290,230 Q -302,195 -270,180 Q -235,168 -195,180 Q -155,195 -120,205 Q -80,218 -70,300 Z" fill="url(#bone)" opacity="0.80"/>
  <path d="M 65,300 Q 160,305 220,285 Q 280,265 290,230 Q 302,195 270,180 Q 235,168 195,180 Q 155,195 120,205 Q 80,218 70,300 Z" fill="url(#bone)" opacity="0.80"/>
  <!-- Chin -->
  <path d="M -70,300 Q 0,325 70,300 L 65,300 Q 0,320 -65,300 Z" fill="url(#bone)" opacity="0.85"/>

  <!-- Orbital ridges (brow) -->
  <path d="M -275,85 Q -200,55 -80,58 Q -40,60 0,62" fill="none" stroke="#b8a070" stroke-width="18" stroke-linecap="round" opacity="0.62"/>
  <path d="M 275,85 Q 200,55 80,58 Q 40,60 0,62" fill="none" stroke="#b8a070" stroke-width="18" stroke-linecap="round" opacity="0.62"/>

  <!-- Eye sockets -->
  <ellipse cx="-148" cy="110" rx="75" ry="58" fill="#050305" opacity="0.90"/>
  <ellipse cx="-148" cy="110" rx="60" ry="45" fill="#020102" opacity="0.95"/>
  <ellipse cx="148" cy="110" rx="75" ry="58" fill="#050305" opacity="0.90"/>
  <ellipse cx="148" cy="110" rx="60" ry="45" fill="#020102" opacity="0.95"/>

  <!-- Nasal cavity -->
  <path d="M -35,178 Q -25,165 0,162 Q 25,165 35,178 Q 45,198 35,218 Q 22,240 0,242 Q -22,240 -35,218 Q -45,198 -35,178 Z" fill="#020102" opacity="0.88"/>

  <!-- Teeth (upper) -->
  <g fill="url(#cranium)" opacity="0.75">
    <rect x="-65" y="270" width="18" height="28" rx="4"/>
    <rect x="-44" y="272" width="16" height="26" rx="4"/>
    <rect x="-25" y="274" width="14" height="24" rx="4"/>
    <rect x="-8" y="275" width="16" height="24" rx="4"/>
    <rect x="12" y="274" width="14" height="24" rx="4"/>
    <rect x="29" y="272" width="16" height="26" rx="4"/>
    <rect x="48" y="270" width="18" height="28" rx="4"/>
  </g>

  <!-- Suture lines on cranium -->
  <g fill="none" stroke="#7a6840" stroke-width="2.5" opacity="0.35" stroke-dasharray="8,5">
    <!-- Coronal suture -->
    <path d="M -310,30 Q -280,-5 -240,-30 Q -160,-62 0,-72 Q 160,-62 240,-30 Q 280,-5 310,30"/>
    <!-- Sagittal suture (top) -->
    <path d="M 0,-380 Q 5,-280 0,-72"/>
    <!-- Lambda area -->
    <path d="M -180,-120 Q -100,-90 0,-85 Q 100,-90 180,-120"/>
  </g>

  <!-- Temporal muscle/tissue details -->
  <g fill="none" stroke="#c0a870" stroke-width="1.8" opacity="0.18">
    <path d="M -340,-40 Q -310,-20 -295,30"/>
    <path d="M -340,20 Q -305,40 -295,80"/>
    <path d="M 340,-40 Q 310,-20 295,30"/>
    <path d="M 340,20 Q 305,40 295,80"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="-80" cy="-290" rx="100" ry="62" fill="rgba(255,248,228,0.22)" transform="rotate(18 -80 -290)"/>
  <ellipse cx="-40" cy="-340" rx="55" ry="32" fill="rgba(255,252,238,0.15)" transform="rotate(8 -40 -340)"/>

  <path d="M 0,-380 C 160,-385 295,-310 340,-175 C 380,-52 365,80 295,165 C 225,248 130,262 80,252 L 70,300 L -70,300 L -80,252 C -130,262 -225,248 -295,165 C -365,80 -380,-52 -340,-175 C -295,-310 -160,-385 0,-380 Z" fill="url(#bSpec)" opacity="0.82"/>
  <path d="M 0,-380 C 160,-385 295,-310 340,-175 C 380,-52 365,80 295,165 C 225,248 130,262 80,252 L 70,300 L -70,300 L -80,252 C -130,262 -225,248 -295,165 C -365,80 -380,-52 -340,-175 C -295,-310 -160,-385 0,-380 Z" fill="none" stroke="#010209" stroke-width="30" opacity="0.52"/>
</g>

<rect width="1080" height="1920" fill="url(#bVig)"/>
<rect width="1080" height="1920" fill="url(#bTop)"/>
<rect width="1080" height="1920" fill="url(#bBot)"/>
</svg>
