<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
<defs>
  <radialGradient id="bg" cx="50%" cy="36%" r="65%">
    <stop offset="0%" stop-color="#1a0808"/>
    <stop offset="100%" stop-color="#010209"/>
  </radialGradient>
  <radialGradient id="hO" cx="350" cy="480" r="520" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#c03434"/>
    <stop offset="30%" stop-color="#8a1a1a"/>
    <stop offset="65%" stop-color="#480a0a"/>
    <stop offset="100%" stop-color="#120202"/>
  </radialGradient>
  <radialGradient id="hI" cx="430" cy="560" r="380" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#d03838"/>
    <stop offset="45%" stop-color="#7a1414"/>
    <stop offset="100%" stop-color="#220606"/>
  </radialGradient>
  <radialGradient id="hS" cx="32%" cy="24%" r="44%">
    <stop offset="0%" stop-color="rgba(255,200,180,0.30)"/>
    <stop offset="55%" stop-color="rgba(255,150,130,0.07)"/>
    <stop offset="100%" stop-color="rgba(255,100,80,0)"/>
  </radialGradient>
  <radialGradient id="hV" cx="50%" cy="46%" r="58%">
    <stop offset="54%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.88"/>
  </radialGradient>
  <linearGradient id="hT" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010209" stop-opacity="0.68"/>
    <stop offset="15%" stop-color="#010209" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="hB" x1="0" y1="0" x2="0" y2="1">
    <stop offset="70%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.80"/>
  </linearGradient>
</defs>
<rect width="1080" height="1920" fill="#010209"/>
<rect width="1080" height="1920" fill="url(#bg)"/>
<ellipse cx="540" cy="730" rx="400" ry="350" fill="#3a0808" opacity="0.52"/>

<!-- HEART cross-section centered at (540,780) -->
<g transform="translate(540,780)">
  <!-- Outer myocardium -->
  <path d="M 0,320 C -100,220 -320,80 -360,-60 C -400,-200 -330,-340 -180,-340 C -100,-340 -40,-295 0,-230 C 40,-295 100,-340 180,-340 C 330,-340 400,-200 360,-60 C 320,80 100,220 0,320 Z" fill="url(#hO)"/>
  <!-- Inner myocardium -->
  <path d="M 0,255 C -80,170 -260,52 -292,-62 C -322,-170 -268,-278 -150,-278 C -84,-278 -34,-240 0,-185 C 34,-240 84,-278 150,-278 C 268,-278 322,-170 292,-62 C 260,52 80,170 0,255 Z" fill="url(#hI)" opacity="0.72"/>
  <!-- Right ventricle -->
  <path d="M -42,-38 C -112,-18 -202,42 -228,110 C -252,178 -212,238 -152,255 C -92,270 -42,234 -22,186 C -6,146 -10,92 -42,-38 Z" fill="#8a1e1e" opacity="0.70"/>
  <path d="M -47,-10 C -102,8 -180,56 -198,110 C -216,157 -186,202 -137,214 C -87,225 -43,193 -27,156 C -13,123 -16,76 -47,-10 Z" fill="#c82828" opacity="0.52"/>
  <!-- Left ventricle -->
  <path d="M 42,-38 C 112,-18 202,42 228,110 C 252,178 212,238 152,255 C 92,270 42,234 22,186 C 6,146 10,92 42,-38 Z" fill="#7a1a1a" opacity="0.66"/>
  <path d="M 43,-14 C 97,0 163,46 185,100 C 203,147 175,188 129,200 C 83,211 45,179 33,143 C 22,111 25,66 43,-14 Z" fill="#b82222" opacity="0.48"/>
  <!-- Interventricular septum -->
  <rect x="-14" y="-120" width="28" height="290" rx="12" fill="#4a0a0a" opacity="0.78"/>
  <!-- Right atrium -->
  <ellipse cx="-158" cy="-165" rx="90" ry="76" fill="#8a1e1e" opacity="0.68"/>
  <ellipse cx="-158" cy="-165" rx="63" ry="53" fill="#c83030" opacity="0.43"/>
  <!-- Left atrium -->
  <ellipse cx="158" cy="-165" rx="90" ry="76" fill="#7a1a1a" opacity="0.63"/>
  <ellipse cx="158" cy="-165" rx="63" ry="53" fill="#b02828" opacity="0.40"/>
  <!-- Interatrial septum -->
  <rect x="-12" y="-226" width="24" height="102" rx="10" fill="#4a0c0c" opacity="0.73"/>
  <!-- Aorta -->
  <path d="M 55,-222 Q 82,-272 62,-332 Q 44,-386 -10,-402 Q -65,-417 -90,-382 Q -116,-346 -90,-312" fill="none" stroke="#c83030" stroke-width="38" stroke-linecap="round" opacity="0.70"/>
  <path d="M 55,-222 Q 82,-272 62,-332 Q 44,-386 -10,-402 Q -65,-417 -90,-382 Q -116,-346 -90,-312" fill="none" stroke="#e86060" stroke-width="13" stroke-linecap="round" opacity="0.23"/>
  <!-- Pulmonary artery -->
  <path d="M -46,-216 Q -72,-268 -54,-326 Q -36,-376 20,-390" fill="none" stroke="#6065c0" stroke-width="32" stroke-linecap="round" opacity="0.60"/>
  <path d="M -46,-216 Q -72,-268 -54,-326 Q -36,-376 20,-390" fill="none" stroke="#9098e0" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
  <!-- Coronary arteries -->
  <g fill="none" stroke="#d05050" stroke-linecap="round" opacity="0.24">
    <path d="M 20,-290 Q 60,-270 80,-230 Q 110,-180 120,-120 Q 138,-55 130,20" stroke-width="5"/>
    <path d="M 130,20 Q 125,80 100,130 Q 70,180 30,220" stroke-width="4"/>
    <path d="M -18,-290 Q -58,-270 -78,-230 Q -112,-178 -122,-115" stroke-width="5"/>
    <path d="M -122,-115 Q -135,-55 -128,20 Q -120,80 -95,135" stroke-width="4"/>
  </g>
  <!-- Specular highlight -->
  <ellipse cx="-90" cy="-250" rx="85" ry="52" fill="rgba(255,210,185,0.18)" transform="rotate(20 -90 -250)"/>
  <path d="M 0,320 C -100,220 -320,80 -360,-60 C -400,-200 -330,-340 -180,-340 C -100,-340 -40,-295 0,-230 C 40,-295 100,-340 180,-340 C 330,-340 400,-200 360,-60 C 320,80 100,220 0,320 Z" fill="url(#hS)" opacity="0.78"/>
  <path d="M 0,320 C -100,220 -320,80 -360,-60 C -400,-200 -330,-340 -180,-340 C -100,-340 -40,-295 0,-230 C 40,-295 100,-340 180,-340 C 330,-340 400,-200 360,-60 C 320,80 100,220 0,320 Z" fill="none" stroke="#010209" stroke-width="35" opacity="0.48"/>
</g>

<rect width="1080" height="1920" fill="url(#hV)"/>
<rect width="1080" height="1920" fill="url(#hT)"/>
<rect width="1080" height="1920" fill="url(#hB)"/>
</svg>
