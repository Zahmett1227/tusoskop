<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
<defs>
  <radialGradient id="bg" cx="50%" cy="38%" r="65%">
    <stop offset="0%" stop-color="#1a0612"/>
    <stop offset="100%" stop-color="#010209"/>
  </radialGradient>
  <!-- Dividing cell - mitotic figure, characteristic of pathology -->
  <radialGradient id="cell" cx="38%" cy="32%" r="65%" gradientUnits="userSpaceOnUse"
                  cx="420" cy="640" r="440">
    <stop offset="0%" stop-color="#fb7185"/>
    <stop offset="30%" stop-color="#be185d"/>
    <stop offset="62%" stop-color="#6d1030"/>
    <stop offset="100%" stop-color="#1e0310"/>
  </radialGradient>
  <radialGradient id="cyto2" cx="42%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#f43f5e"/>
    <stop offset="45%" stop-color="#9f1239"/>
    <stop offset="100%" stop-color="#340b18"/>
  </radialGradient>
  <radialGradient id="nucleus" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#fda4af"/>
    <stop offset="42%" stop-color="#f43f5e"/>
    <stop offset="100%" stop-color="#881337"/>
  </radialGradient>
  <radialGradient id="pSpec" cx="34%" cy="26%" r="44%">
    <stop offset="0%" stop-color="rgba(253,164,175,0.32)"/>
    <stop offset="55%" stop-color="rgba(251,113,133,0.07)"/>
    <stop offset="100%" stop-color="rgba(244,63,94,0)"/>
  </radialGradient>
  <radialGradient id="pVig" cx="50%" cy="46%" r="58%">
    <stop offset="52%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.90"/>
  </radialGradient>
  <linearGradient id="pTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010209" stop-opacity="0.65"/>
    <stop offset="14%" stop-color="#010209" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="pBot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="68%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.82"/>
  </linearGradient>
</defs>
<rect width="1080" height="1920" fill="#010209"/>
<rect width="1080" height="1920" fill="url(#bg)"/>
<ellipse cx="540" cy="750" rx="420" ry="370" fill="#2a0515" opacity="0.55"/>

<!-- DIVIDING CELL (anaphase) — pathology hallmark centered at (540,750) -->
<g transform="translate(540, 750)">
  <!-- Parent cell outer membrane (dumbbell shape during division) -->
  <path d="M -320,-180 C -380,-180 -420,-130 -420,-60 C -420,15 -375,70 -310,85 C -250,100 -190,85 -150,55 C -120,32 -100,5 -50,0 C -8,-4 8,-4 50,0 C 100,5 120,32 150,55 C 190,85 250,100 310,85 C 375,70 420,15 420,-60 C 420,-130 380,-180 320,-180 C 265,-180 220,-148 190,-108 C 160,-68 145,-22 130,0 C 115,22 68,38 0,38 C -68,38 -115,22 -130,0 C -145,-22 -160,-68 -190,-108 C -220,-148 -265,-180 -320,-180 Z"
    fill="url(#cell)"/>

  <!-- Cytoplasm inner -->
  <path d="M -290,-155 C -348,-155 -384,-108 -384,-42 C -384,22 -342,70 -280,82 C -225,94 -172,80 -135,52 C -107,29 -90,4 -45,0 C -8,-4 8,-4 45,0 C 90,4 107,29 135,52 C 172,80 225,94 280,82 C 342,70 384,22 384,-42 C 384,-108 348,-155 290,-155 C 240,-155 200,-125 174,-88 C 148,-51 135,-10 115,0 C 95,10 65,22 0,22 C -65,22 -95,10 -115,0 C -135,-10 -148,-51 -174,-88 C -200,-125 -240,-155 -290,-155 Z"
    fill="url(#cyto2)" opacity="0.62"/>

  <!-- Left nucleus (separating) -->
  <ellipse cx="-265" cy="-45" rx="92" ry="72" fill="url(#nucleus)" opacity="0.88"/>
  <!-- Left nuclear envelope breaking down -->
  <ellipse cx="-265" cy="-45" rx="92" ry="72" fill="none" stroke="#fda4af" stroke-width="4" opacity="0.50" stroke-dasharray="15,8"/>
  <!-- Left chromosomes (metaphase plate) -->
  <g fill="#fda4af" opacity="0.72">
    <ellipse cx="-295" cy="-55" rx="18" ry="8" transform="rotate(-20 -295 -55)"/>
    <ellipse cx="-272" cy="-68" rx="16" ry="7" transform="rotate(15 -272 -68)"/>
    <ellipse cx="-248" cy="-50" rx="18" ry="8" transform="rotate(-10 -248 -50)"/>
    <ellipse cx="-278" cy="-35" rx="16" ry="7" transform="rotate(25 -278 -35)"/>
    <ellipse cx="-258" cy="-28" rx="15" ry="6" transform="rotate(-15 -258 -28)"/>
    <ellipse cx="-282" cy="-18" rx="16" ry="7" transform="rotate(10 -282 -18)"/>
  </g>
  <!-- Left nucleolus -->
  <ellipse cx="-258" cy="-52" rx="22" ry="16" fill="#fecdd3" opacity="0.60"/>

  <!-- Right nucleus (separating) -->
  <ellipse cx="265" cy="-45" rx="92" ry="72" fill="url(#nucleus)" opacity="0.85"/>
  <ellipse cx="265" cy="-45" rx="92" ry="72" fill="none" stroke="#fda4af" stroke-width="4" opacity="0.48" stroke-dasharray="15,8"/>
  <!-- Right chromosomes -->
  <g fill="#fda4af" opacity="0.70">
    <ellipse cx="295" cy="-55" rx="18" ry="8" transform="rotate(20 295 -55)"/>
    <ellipse cx="272" cy="-68" rx="16" ry="7" transform="rotate(-15 272 -68)"/>
    <ellipse cx="248" cy="-50" rx="18" ry="8" transform="rotate(10 248 -50)"/>
    <ellipse cx="278" cy="-35" rx="16" ry="7" transform="rotate(-25 278 -35)"/>
    <ellipse cx="258" cy="-28" rx="15" ry="6" transform="rotate(15 258 -28)"/>
    <ellipse cx="282" cy="-18" rx="16" ry="7" transform="rotate(-10 282 -18)"/>
  </g>
  <ellipse cx="258" cy="-52" rx="22" ry="16" fill="#fecdd3" opacity="0.58"/>

  <!-- Mitotic spindle fibers -->
  <g stroke="#fb7185" stroke-width="2" fill="none" opacity="0.38">
    <line x1="-265" y1="-120" x2="0" y2="-200"/>
    <line x1="-265" y1="-100" x2="0" y2="-200"/>
    <line x1="-265" y1="-80" x2="0" y2="-200"/>
    <line x1="-265" y1="30" x2="0" y2="110"/>
    <line x1="-265" y1="10" x2="0" y2="110"/>
    <line x1="265" y1="-120" x2="0" y2="-200"/>
    <line x1="265" y1="-100" x2="0" y2="-200"/>
    <line x1="265" y1="-80" x2="0" y2="-200"/>
    <line x1="265" y1="30" x2="0" y2="110"/>
    <line x1="265" y1="10" x2="0" y2="110"/>
  </g>

  <!-- Cleavage furrow (pinching in the middle) -->
  <path d="M -50,-180 Q -20,-200 0,-200 Q 20,-200 50,-180" fill="none" stroke="#fda4af" stroke-width="3" opacity="0.42"/>
  <path d="M -50,60 Q -20,82 0,82 Q 20,82 50,60" fill="none" stroke="#fda4af" stroke-width="3" opacity="0.42"/>

  <!-- Mitochondria scattered in cytoplasm -->
  <g fill="none" stroke="#f43f5e" stroke-width="2.5" opacity="0.32">
    <ellipse cx="-120" cy="-130" rx="18" ry="9" transform="rotate(-30 -120 -130)"/>
    <ellipse cx="125" cy="-125" rx="20" ry="10" transform="rotate(25 125 -125)"/>
    <ellipse cx="-140" cy="30" rx="16" ry="8" transform="rotate(-20 -140 30)"/>
    <ellipse cx="140" cy="28" rx="18" ry="9" transform="rotate(20 140 28)"/>
    <ellipse cx="-100" cy="-155" rx="15" ry="8" transform="rotate(-40 -100 -155)"/>
    <ellipse cx="105" cy="-152" rx="16" ry="8" transform="rotate(35 105 -152)"/>
  </g>

  <!-- Specular -->
  <ellipse cx="-90" cy="-145" rx="95" ry="58" fill="rgba(253,164,175,0.20)" transform="rotate(22 -90 -145)"/>
  <path d="M -320,-180 C -380,-180 -420,-130 -420,-60 C -420,15 -375,70 -310,85 C -250,100 -190,85 -150,55 C -120,32 -100,5 -50,0 C -8,-4 8,-4 50,0 C 100,5 120,32 150,55 C 190,85 250,100 310,85 C 375,70 420,15 420,-60 C 420,-130 380,-180 320,-180 C 265,-180 220,-148 190,-108 C 160,-68 145,-22 130,0 C 115,22 68,38 0,38 C -68,38 -115,22 -130,0 C -145,-22 -160,-68 -190,-108 C -220,-148 -265,-180 -320,-180 Z"
    fill="url(#pSpec)" opacity="0.75"/>
  <path d="M -320,-180 C -380,-180 -420,-130 -420,-60 C -420,15 -375,70 -310,85 C -250,100 -190,85 -150,55 C -120,32 -100,5 -50,0 C -8,-4 8,-4 50,0 C 100,5 120,32 150,55 C 190,85 250,100 310,85 C 375,70 420,15 420,-60 C 420,-130 380,-180 320,-180 C 265,-180 220,-148 190,-108 C 160,-68 145,-22 130,0 C 115,22 68,38 0,38 C -68,38 -115,22 -130,0 C -145,-22 -160,-68 -190,-108 C -220,-148 -265,-180 -320,-180 Z"
    fill="none" stroke="#010209" stroke-width="32" opacity="0.50"/>
</g>

<!-- Background cells (smaller, dimmer) -->
<g opacity="0.14">
  <ellipse cx="185" cy="280" rx="65" ry="48" fill="#f43f5e"/>
  <ellipse cx="895" cy="355" rx="70" ry="52" fill="#f43f5e"/>
  <ellipse cx="155" cy="1380" rx="60" ry="45" fill="#f43f5e"/>
  <ellipse cx="920" cy="1290" rx="68" ry="50" fill="#f43f5e"/>
</g>

<rect width="1080" height="1920" fill="url(#pVig)"/>
<rect width="1080" height="1920" fill="url(#pTop)"/>
<rect width="1080" height="1920" fill="url(#pBot)"/>
</svg>
