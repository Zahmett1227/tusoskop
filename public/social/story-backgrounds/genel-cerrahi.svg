<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
<defs>
  <radialGradient id="bg" cx="50%" cy="36%" r="65%">
    <stop offset="0%" stop-color="#1a0c04"/>
    <stop offset="100%" stop-color="#010209"/>
  </radialGradient>
  <!-- Liver gradient — dark reddish-brown, orange tones -->
  <radialGradient id="liver" cx="360" cy="500" r="540" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#c2410c"/>
    <stop offset="28%" stop-color="#92400e"/>
    <stop offset="62%" stop-color="#4a1c06"/>
    <stop offset="100%" stop-color="#140602"/>
  </radialGradient>
  <radialGradient id="liverIn" cx="430" cy="580" r="400" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#ea580c"/>
    <stop offset="45%" stop-color="#7c2d12"/>
    <stop offset="100%" stop-color="#250804"/>
  </radialGradient>
  <radialGradient id="gall" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#bef264"/>
    <stop offset="50%" stop-color="#4d7c0f"/>
    <stop offset="100%" stop-color="#1a2e05"/>
  </radialGradient>
  <radialGradient id="gSpec" cx="34%" cy="24%" r="44%">
    <stop offset="0%" stop-color="rgba(253,186,116,0.32)"/>
    <stop offset="55%" stop-color="rgba(234,88,12,0.07)"/>
    <stop offset="100%" stop-color="rgba(194,65,12,0)"/>
  </radialGradient>
  <radialGradient id="gVig" cx="50%" cy="46%" r="58%">
    <stop offset="52%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.90"/>
  </radialGradient>
  <linearGradient id="gTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010209" stop-opacity="0.65"/>
    <stop offset="14%" stop-color="#010209" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="gBot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="68%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.82"/>
  </linearGradient>
</defs>
<rect width="1080" height="1920" fill="#010209"/>
<rect width="1080" height="1920" fill="url(#bg)"/>
<ellipse cx="540" cy="750" rx="420" ry="380" fill="#2a0c04" opacity="0.55"/>

<!-- LIVER centered at (540, 750), ~900×520px -->
<g transform="translate(540, 750)">
  <!-- Main liver shape — large, dome-shaped right lobe + smaller left lobe -->
  <!-- Right lobe (much larger, upper-right) -->
  <path d="M 0,-200 C 80,-245 200,-250 300,-228 C 400,-206 460,-152 468,-82 C 476,-12 440,52 388,102 C 336,152 268,178 192,192 C 116,206 40,198 0,182 L 0,-200 Z"
    fill="url(#liver)"/>
  <!-- Left lobe (smaller, extends to the left) -->
  <path d="M 0,-200 C -60,-220 -140,-215 -212,-185 C -284,-155 -330,-100 -338,-38 C -346,24 -318,80 -272,118 C -226,156 -162,168 -100,158 C -52,150 -18,128 0,104 L 0,-200 Z"
    fill="url(#liver)"/>

  <!-- Hepatic surface texture (lobular pattern) -->
  <path d="M 0,-200 C 80,-245 200,-250 300,-228 C 400,-206 460,-152 468,-82 C 476,-12 440,52 388,102 C 336,152 268,178 192,192 C 116,206 40,198 0,182 C -18,128 -52,150 -100,158 C -162,168 -226,156 -272,118 C -318,80 -346,24 -338,-38 C -330,-100 -284,-155 -212,-185 C -140,-215 -60,-220 0,-200 Z"
    fill="url(#liverIn)" opacity="0.55"/>

  <!-- Hepatic lobes fissure (falciform ligament area) -->
  <path d="M 0,-200 Q 0,-80 -5,182" fill="none" stroke="#010209" stroke-width="14" opacity="0.45"/>

  <!-- Right lobe major hepatic veins -->
  <g fill="none" stroke="#7c2d12" stroke-linecap="round" opacity="0.38">
    <path d="M 80,-180 Q 120,-120 140,-50 Q 160,20 150,90" stroke-width="12"/>
    <path d="M 200,-200 Q 250,-140 275,-68 Q 300,8 295,80" stroke-width="10"/>
    <path d="M 330,-180 Q 368,-115 390,-42 Q 412,28 400,92" stroke-width="9"/>
    <path d="M 50,-150 Q 70,-80 80,-8 Q 90,65 82,128" stroke-width="9"/>
  </g>

  <!-- Left lobe hepatic veins -->
  <g fill="none" stroke="#7c2d12" stroke-linecap="round" opacity="0.34">
    <path d="M -80,-165 Q -100,-100 -105,-30 Q -110,42 -100,105" stroke-width="10"/>
    <path d="M -165,-155 Q -200,-90 -210,-20 Q -218,52 -208,112" stroke-width="9"/>
    <path d="M -255,-115 Q -280,-52 -282,18 Q -284,88 -270,138" stroke-width="8"/>
  </g>

  <!-- Hepatic artery and portal vein (at porta hepatis - inferior surface) -->
  <path d="M -40,182 Q -20,210 0,220 Q 20,210 40,182" fill="none" stroke="#b45309" stroke-width="20" stroke-linecap="round" opacity="0.65"/>
  <path d="M -60,195 Q -30,225 0,238 Q 30,225 60,195" fill="none" stroke="#5a0ea0" stroke-width="16" stroke-linecap="round" opacity="0.50"/>

  <!-- Gallbladder (pear-shaped, attached to inferior right lobe) -->
  <path d="M 120,195 Q 138,218 132,252 Q 126,288 108,305 Q 90,320 70,318 Q 50,315 38,298 Q 25,278 28,252 Q 32,228 50,210 Q 68,194 90,188 Q 112,182 120,195 Z"
    fill="url(#gall)" opacity="0.82"/>
  <!-- Cystic duct -->
  <path d="M 90,188 Q 78,165 55,145 Q 28,122 0,132" fill="none" stroke="#4d7c0f" stroke-width="8" stroke-linecap="round" opacity="0.65"/>
  <!-- Gallbladder bile (dark interior) -->
  <ellipse cx="80" cy="260" rx="28" ry="38" fill="#365314" opacity="0.55"/>

  <!-- Common bile duct -->
  <path d="M 0,132 Q -5,160 -2,188 Q 0,220 2,238" fill="none" stroke="#4d7c0f" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

  <!-- Surface texture: hepatic lobule patterns (very subtle hexagonal) -->
  <g fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.14">
    <path d="M 80,-100 L 106,-83 L 106,-50 L 80,-33 L 54,-50 L 54,-83 Z"/>
    <path d="M 160,-80 L 186,-63 L 186,-30 L 160,-13 L 134,-30 L 134,-63 Z"/>
    <path d="M 240,-60 L 266,-43 L 266,-10 L 240,7 L 214,-10 L 214,-43 Z"/>
    <path d="M 80,20 L 106,37 L 106,70 L 80,87 L 54,70 L 54,37 Z"/>
    <path d="M 160,40 L 186,57 L 186,90 L 160,107 L 134,90 L 134,57 Z"/>
    <path d="M -80,-80 L -54,-63 L -54,-30 L -80,-13 L -106,-30 L -106,-63 Z"/>
    <path d="M -160,-60 L -134,-43 L -134,-10 L -160,7 L -186,-10 L -186,-43 Z"/>
    <path d="M -80,20 L -54,37 L -54,70 L -80,87 L -106,70 L -106,37 Z"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="-60" cy="-220" rx="110" ry="65" fill="rgba(253,186,116,0.20)" transform="rotate(18 -60 -220)"/>
  <ellipse cx="-25" cy="-265" rx="62" ry="35" fill="rgba(254,215,170,0.14)" transform="rotate(8 -25 -265)"/>

  <path d="M 0,-200 C 80,-245 200,-250 300,-228 C 400,-206 460,-152 468,-82 C 476,-12 440,52 388,102 C 336,152 268,178 192,192 C 116,206 40,198 0,182 C -18,128 -52,150 -100,158 C -162,168 -226,156 -272,118 C -318,80 -346,24 -338,-38 C -330,-100 -284,-155 -212,-185 C -140,-215 -60,-220 0,-200 Z"
    fill="url(#gSpec)" opacity="0.78"/>
  <path d="M 0,-200 C 80,-245 200,-250 300,-228 C 400,-206 460,-152 468,-82 C 476,-12 440,52 388,102 C 336,152 268,178 192,192 C 116,206 40,198 0,182 C -18,128 -52,150 -100,158 C -162,168 -226,156 -272,118 C -318,80 -346,24 -338,-38 C -330,-100 -284,-155 -212,-185 C -140,-215 -60,-220 0,-200 Z"
    fill="none" stroke="#010209" stroke-width="32" opacity="0.50"/>
</g>

<rect width="1080" height="1920" fill="url(#gVig)"/>
<rect width="1080" height="1920" fill="url(#gTop)"/>
<rect width="1080" height="1920" fill="url(#gBot)"/>
</svg>
