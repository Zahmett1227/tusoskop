<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
<defs>
  <radialGradient id="bg" cx="50%" cy="36%" r="65%">
    <stop offset="0%" stop-color="#0e0c2a"/>
    <stop offset="100%" stop-color="#010209"/>
  </radialGradient>
  <!-- Eye outer sclera -->
  <radialGradient id="sclera" cx="38%" cy="32%" r="68%" gradientUnits="userSpaceOnUse"
                  cx="400" cy="540" r="520">
    <stop offset="0%" stop-color="#f0ece4"/>
    <stop offset="28%" stop-color="#c8c0a8"/>
    <stop offset="62%" stop-color="#7a7060"/>
    <stop offset="100%" stop-color="#1a1810"/>
  </radialGradient>
  <!-- Iris gradient -->
  <radialGradient id="iris" cx="42%" cy="38%" r="62%">
    <stop offset="0%" stop-color="#818cf8"/>
    <stop offset="35%" stop-color="#4f46e5"/>
    <stop offset="70%" stop-color="#312e81"/>
    <stop offset="100%" stop-color="#0a0928"/>
  </radialGradient>
  <!-- Pupil -->
  <radialGradient id="pupil" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#0a0814"/>
    <stop offset="100%" stop-color="#020108"/>
  </radialGradient>
  <!-- Cornea (clear dome) -->
  <radialGradient id="cornea" cx="38%" cy="32%" r="55%">
    <stop offset="0%" stop-color="rgba(220,225,255,0.42)"/>
    <stop offset="55%" stop-color="rgba(180,190,255,0.12)"/>
    <stop offset="100%" stop-color="rgba(100,120,255,0)"/>
  </radialGradient>
  <radialGradient id="eSpec" cx="34%" cy="26%" r="44%">
    <stop offset="0%" stop-color="rgba(200,195,255,0.38)"/>
    <stop offset="55%" stop-color="rgba(160,150,255,0.08)"/>
    <stop offset="100%" stop-color="rgba(100,80,220,0)"/>
  </radialGradient>
  <radialGradient id="eVig" cx="50%" cy="46%" r="58%">
    <stop offset="52%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.90"/>
  </radialGradient>
  <linearGradient id="eTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010209" stop-opacity="0.65"/>
    <stop offset="14%" stop-color="#010209" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="eBot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="68%" stop-color="#010209" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010209" stop-opacity="0.82"/>
  </linearGradient>
</defs>
<rect width="1080" height="1920" fill="#010209"/>
<rect width="1080" height="1920" fill="url(#bg)"/>
<ellipse cx="540" cy="720" rx="420" ry="380" fill="#12103a" opacity="0.55"/>

<!-- EYE cross-section centered at (540,720) — sagittal view -->
<g transform="translate(540, 720)">
  <!-- Outer eye wall (sclera + choroid) — sphere cross-section -->
  <circle cx="0" cy="0" r="380" fill="url(#sclera)"/>

  <!-- Choroid layer (vascular, darker) -->
  <circle cx="0" cy="0" r="350" fill="#2a2840" opacity="0.65"/>
  <!-- Retina layer (inner) -->
  <circle cx="0" cy="0" r="332" fill="#1e1c38" opacity="0.80"/>
  <!-- Vitreous humor (clear gel filling) -->
  <circle cx="0" cy="0" r="318" fill="#0e0c28" opacity="0.70"/>
  <!-- Aqueous humor space (anterior chamber, in front of lens) -->
  <path d="M -180,-250 Q 0,-280 180,-250 Q 0,-120 -180,-250 Z" fill="#12103a" opacity="0.60"/>

  <!-- Lens (biconvex, positioned anteriorly) -->
  <ellipse cx="0" cy="-105" rx="105" ry="58" fill="#2a285a" opacity="0.82"/>
  <!-- Lens gradient for 3D -->
  <ellipse cx="0" cy="-105" rx="90" ry="48" fill="#4a4898" opacity="0.55"/>
  <ellipse cx="-18" cy="-118" rx="45" ry="22" fill="rgba(180,180,255,0.22)"/>
  <!-- Lens capsule -->
  <ellipse cx="0" cy="-105" rx="105" ry="58" fill="none" stroke="#8b8ce8" stroke-width="4" opacity="0.40"/>
  <!-- Zonular fibers (suspensory ligaments) -->
  <g stroke="#6366f1" stroke-width="2.5" fill="none" opacity="0.38">
    <line x1="-95" y1="-58" x2="-145" y2="-25"/>
    <line x1="-80" y1="-52" x2="-135" y2="-15"/>
    <line x1="-65" y1="-48" x2="-125" y2="-8"/>
    <line x1="95" y1="-58" x2="145" y2="-25"/>
    <line x1="80" y1="-52" x2="135" y2="-15"/>
    <line x1="65" y1="-48" x2="125" y2="-8"/>
    <line x1="-95" y1="-152" x2="-145" y2="-185"/>
    <line x1="-80" y1="-158" x2="-135" y2="-192"/>
    <line x1="95" y1="-152" x2="145" y2="-185"/>
    <line x1="80" y1="-158" x2="135" y2="-192"/>
  </g>
  <!-- Ciliary body (circular muscle ring around lens) -->
  <g fill="none" stroke="#4f46e5" stroke-width="12" opacity="0.52">
    <path d="M -145,-25 Q -162,-5 -160,20 Q -158,45 -142,58"/>
    <path d="M 145,-25 Q 162,-5 160,20 Q 158,45 142,58"/>
  </g>

  <!-- Iris (pigmented ring with pupil hole) -->
  <!-- Iris outer ring -->
  <circle cx="0" cy="0" r="165" fill="url(#iris)"/>
  <!-- Iris inner circle (what surrounds pupil) — circular muscle patterns -->
  <g fill="none" stroke="#818cf8" stroke-width="1.8" opacity="0.25">
    <circle cx="0" cy="0" r="128"/>
    <circle cx="0" cy="0" r="110"/>
    <circle cx="0" cy="0" r="92"/>
    <!-- Iris radial fibers -->
    <line x1="-165" y1="0" x2="-88" y2="0"/>
    <line x1="165" y1="0" x2="88" y2="0"/>
    <line x1="0" y1="-165" x2="0" y2="-88"/>
    <line x1="0" y1="165" x2="0" y2="88"/>
    <line x1="-117" y1="-117" x2="-62" y2="-62"/>
    <line x1="117" y1="-117" x2="62" y2="-62"/>
    <line x1="-117" y1="117" x2="-62" y2="62"/>
    <line x1="117" y1="117" x2="62" y2="62"/>
  </g>

  <!-- Pupil (opening) -->
  <circle cx="0" cy="0" r="85" fill="url(#pupil)"/>
  <!-- Pupil is transparent — vitreous shows through -->
  <circle cx="0" cy="0" r="80" fill="#0a0820" opacity="0.92"/>

  <!-- Cornea (transparent dome, anterior) -->
  <path d="M -200,-270 Q 0,-380 200,-270" fill="url(#sclera)" opacity="0.82"/>
  <path d="M -200,-270 Q 0,-380 200,-270" fill="url(#cornea)" opacity="0.72"/>
  <path d="M -200,-270 Q 0,-378 200,-270" fill="none" stroke="#a5b4fc" stroke-width="5" opacity="0.38"/>

  <!-- Optic nerve (posterior, exits at optic disc) -->
  <ellipse cx="115" cy="180" rx="42" ry="42" fill="#1e1c38" opacity="0.85"/>
  <ellipse cx="115" cy="180" rx="28" ry="28" fill="#2a2858" opacity="0.72"/>
  <!-- Optic disc cup -->
  <ellipse cx="115" cy="180" rx="18" ry="18" fill="#0a0920" opacity="0.82"/>
  <!-- Optic nerve cable -->
  <path d="M 115,222 Q 115,290 115,380" fill="none" stroke="#3730a3" stroke-width="52" opacity="0.65"/>
  <path d="M 115,222 Q 115,290 115,380" fill="none" stroke="#818cf8" stroke-width="16" opacity="0.20"/>

  <!-- Retinal vessels (visible inside eye) -->
  <g fill="none" stroke="#4338ca" stroke-linecap="round" opacity="0.30">
    <path d="M 115,145 Q 60,100 -50,80 Q -160,60 -280,75" stroke-width="6"/>
    <path d="M 115,145 Q 80,80 0,30 Q -80,-20 -180,-10" stroke-width="5"/>
    <path d="M 115,145 Q 110,50 90,-60 Q 70,-160 80,-260" stroke-width="5"/>
    <path d="M 115,145 Q 150,80 180,0 Q 210,-85 220,-200" stroke-width="4.5"/>
    <path d="M 115,180 Q 60,200 -60,220 Q -160,240 -270,230" stroke-width="5"/>
  </g>

  <!-- Fovea (central vision point, slight depression) -->
  <circle cx="-85" cy="90" r="28" fill="none" stroke="#c7d2fe" stroke-width="3" opacity="0.42"/>
  <circle cx="-85" cy="90" r="12" fill="#312e81" opacity="0.58"/>

  <!-- Cornea light reflex (catch light) -->
  <ellipse cx="-55" cy="-295" rx="28" ry="18" fill="rgba(255,255,255,0.45)" transform="rotate(15 -55 -295)"/>
  <ellipse cx="-22" cy="-340" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <!-- Specular highlight on sclera -->
  <ellipse cx="-115" cy="-290" rx="88" ry="52" fill="rgba(200,195,255,0.22)" transform="rotate(22 -115 -290)"/>
  <ellipse cx="-60" cy="-348" rx="50" ry="28" fill="rgba(220,218,255,0.15)" transform="rotate(12 -60 -348)"/>
  <circle cx="0" cy="0" r="380" fill="url(#eSpec)" opacity="0.75"/>
  <circle cx="0" cy="0" r="380" fill="none" stroke="#010209" stroke-width="32" opacity="0.50"/>
</g>

<rect width="1080" height="1920" fill="url(#eVig)"/>
<rect width="1080" height="1920" fill="url(#eTop)"/>
<rect width="1080" height="1920" fill="url(#eBot)"/>
</svg>
