<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: viewport-fit=cover = safe area desteği (iPhone çentik / home indicator) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon + iOS Ana Ekran (Safari → Paylaş → Ana Ekrana Ekle) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Safari: uygulamayı native-like aç -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tusoskop" />

    <!-- Android Chrome tema rengi -->
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Tusoskop — TUS Hazırlık</title>
    <meta name="description" content="TUS hedefi olan doktorlar için modern, interaktif ve akıllı deneme çözme platformu.">
    <meta name="keywords" content="TUS, Tıpta Uzmanlık Sınavı, TUS deneme çöz, Tusoskop, Tus Platform, Tus soru">
    <link rel="canonical" href="https://tusoskop.web.app/" />

    <!-- Open Graph / Twitter (sosyal paylaşım) — özel alan adı kullanıyorsanız URL’leri güncelleyin -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tusoskop.web.app/" />
    <meta property="og:title" content="Tusoskop — TUS Hazırlık" />
    <meta property="og:description" content="TUS hedefi olan doktorlar için modern, interaktif ve akıllı deneme çözme platformu." />
    <meta property="og:image" content="https://tusoskop.web.app/og-share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="tr_TR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tusoskop — TUS Hazırlık" />
    <meta name="twitter:description" content="TUS hedefi olan doktorlar için modern, interaktif ve akıllı deneme çözme platformu." />
    <meta name="twitter:image" content="https://tusoskop.web.app/og-share.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
