name: Daily Instagram Post

on:
  schedule:
    - cron: '0 18 * * *'   # 21:00 İstanbul (UTC+3)
  workflow_dispatch:        # Manuel tetikleyici

jobs:
  post-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export questions JSON
        run: node scripts/export-questions.mjs

      - name: Install post renderer deps
        run: npm install --no-audit --prefer-offline
        working-directory: scripts/instagram

      - name: Verify questions exported
        run: |
          if [ ! -f scripts/instagram/questions.json ]; then
            echo "❌ questions.json oluşturulamadı"
            exit 1
          fi
          COUNT=$(python3 -c "import json; data=json.load(open('scripts/instagram/questions.json')); print(len(data))")
          echo "✓ $COUNT soru dışa aktarıldı"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/instagram/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get install -y fonts-liberation fonts-dejavu-core libcairo2 libcairo2-dev pkg-config python3-dev
          echo "✓ Sistem bağımlılıkları kuruldu"

      - name: Post Instagram Carousel
        working-directory: scripts/instagram
        run: python post_story.py
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Carousel yayını başarısız oldu! Loglara bakın."
