name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-build-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up JDK (Firestore emulatörü için gerekli)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      # Firestore güvenlik kurallarının regresyon kapısı. Emülatör Java + firebase-tools
      # gerektirir; test scripti (scripts/firestore-rules-emulator-test.mjs) REST üzerinden
      # emülatöre bağlanır, gerçek kimlik doğrulaması/credential gerektirmez.
      - name: Install firebase-tools (emulator)
        run: npm install -g firebase-tools

      - name: Firestore rules tests (emulator)
        run: npm run test:rules

      - name: Question bank validation
        run: npm run validate:questions

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e
